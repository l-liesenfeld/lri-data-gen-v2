# synth-data experiment config
# Run with:  synth generate config/example.yaml

experiment:
  name: "example_run"
  # output_dir: "data/output"      # optional; default data/output
  # notes: "first run with 4o"     # optional; copied into run_meta.json

# Supported prefixes: 'openai:' and 'anthropic:'. Run `python cli.py wizard`
# to see the full model list with pricing. Recommended default:
model: "openai:gpt-5.4"
# Alternatives:
#   openai:gpt-4.1-mini            cheaper, 1M ctx
#   anthropic:claude-sonnet-4-6    alternate provider for comparison

generation:
  n_responses: 10 # total calls (one entry per call)
  response_length: 3 # sentences per entry, 1..5
  language: "english" # english | deutsch | deutsch-english
  context_hint: "" # optional; e.g. "workplace situation"
  # temperature: 0.9        # optional; default 0.9
  # max_tokens: 512         # optional; default 512

runtime:
  concurrency: 3 # parallel in-flight calls (default 3)
  # max_retries: 8             # per-call retries on 429/5xx (default 8)
  # timeout_seconds: 60        # per-call HTTP timeout (default 60)
  #
  # Optional proactive rate limiting. Set these to match your OpenAI tier so
  # we pace below the ceiling instead of relying on 429-and-retry.
  # Example for Tier 1 on gpt-4o:
  # requests_per_minute: 500
  # tokens_per_minute: 30000

# Motive selection. Three forms, mix freely:
#
#   - id: A1
#     strength: 0.7
#
#   Shorthand mapping:
#   A1: 0.7
#   L3: 0.4
#
#   Category expansion (all 5 cells in category):
#   - category: A
#     strength: 0.5
#
# Strengths are 0.1..1.0. If an explicit id and a category expansion
# assign the same motive, the explicit id wins (with a warning).
motives:
  - id: A1
    strength: 0.7
  - id: L3
    strength: 0.4
  - id: M2
    strength: 0.5
